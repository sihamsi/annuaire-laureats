# Server
server.port=8080
spring.application.name=laureat-api

# # Database - H2 (TEMPORAIRE - pour tester)
# spring.datasource.url=jdbc:h2:mem:laureatdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# DÉCOMMENTE PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/laureat_db
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# Disable H2 Console (car vous avez PostgreSQL)
spring.h2.console.enabled=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.example.demo=DEBUG


# Ajoutez cette configuration pour les ENUMs PostgreSQL
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
